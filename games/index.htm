<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Games Collection</title>
    <style>
        :root {
            --bg: #94c8fc;
            --text: #000066;
            --link: #086A87;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            position: relative;
            min-height: 150px;
        }
        .flag {
            position: absolute;
            top: 0;
            width: 180px;
            max-width: 25vw;
            height: auto;
        }
        .flag.left { left: 0; }
        .flag.right { right: 0; }
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        .games-grid {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 0.8rem;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }
        a {
            color: var(--link);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }
        a:hover { color: #ff0000; }
        .extra {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <img class="flag left" src="union%20jack3.gif" alt="Union Jack flag left">
        <img class="flag right" src="union%20jack4.gif" alt="Union Jack flag right">
        <h1>Games</h1>
    </header>

    <main>
        <ul class="games-grid">
            <li><a href="https://kids.nationalgeographic.com/games/funny-fill-in/#:~:text=Power%20Plant" target="_blank" rel="noopener noreferrer">Funny fill-in</a></li>
            <li><a href="https://eslcrosswords.com/" target="_blank" rel="noopener noreferrer">Crosswords</a></li>
            <li><a href="https://www.wordsearchwhiz.com/esl/index.shtml" target="_blank" rel="noopener noreferrer">Word Search</a></li>
            <li><a href="https://wordleunlimited.org/" target="_blank" rel="noopener noreferrer">Wordle</a></li>
            <li><a href="https://learnenglishteens.britishcouncil.org/vocabulary/vocabulary-games/wordshake" target="_blank" rel="noopener noreferrer">Wordshake</a></li>
            <li><a href="https://f4af0e655f1ba813387a-9d4e141fd1fc6c7c833d00398717c341.ssl.cf6.rackcdn.com/sushi-spell/sushi-spell2.html" target="_blank" rel="noopener noreferrer">Sushi Spell</a></li>
            <li><a href="steam://rungameid/730" target="_blank" rel="noopener noreferrer">Counter Strike 2</a></li>
            <li><a href="https://www.visualthesaurus.com/bee/play" target="_blank" rel="noopener noreferrer">Spelling Bee</a></li>
            <li><a href="https://www.gamestolearnenglish.com/" target="_blank" rel="noopener noreferrer">Games to learn English</a></li>
            <li><a href="https://www.merriam-webster.com/games/see-all?p=1" target="_blank" rel="noopener noreferrer">Quizzes</a></li>
            <li><a href="https://playknoword.com/play" target="_blank" rel="noopener noreferrer">Knoword</a></li>
            <li><a href="https://playscrabble.com/" target="_blank" rel="noopener noreferrer">Scrabble</a></li>
            <li><a href="https://quickdraw.withgoogle.com/?locale=en_US" target="_blank" rel="noopener noreferrer">Quick, Draw!</a></li>
            <li><a href="https://jacktheriddler.dk/mm_81s3tvl0GjVq/" target="_blank" rel="noopener noreferrer">Murder Mansion</a></li>
            <li><a href="https://poki.com/de/g/guess-who#" target="_blank" rel="noopener noreferrer">Guess Who</a></li>
            <li><a href="https://zty.pe/" target="_blank" rel="noopener noreferrer">Ztype</a></li>
            <li><a href="https://www.humanornot.ai/" target="_blank" rel="noopener noreferrer">Human or Not</a></li>
            <li><a href="https://www.roblox.com/" target="_blank" rel="noopener noreferrer">Roblox</a></li>
        </ul>
        <div class="extra">
            <iframe width="110" height="200" src="https://www.myinstants.com/instant/bombaclaaat-17137/embed/" frameborder="0" scrolling="no" title="Bombaclaaat soundboard embed"></iframe>
        </div>
    </main>
</body>
</html>
